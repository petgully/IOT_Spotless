{% extends 'base.html' %}

{% block title %}Login - Petgully Spotless{% endblock %}

{% block content %}
<div style="text-align: center; padding: 20px 0;">
    <div style="width: 80px; height: 80px; background: var(--primary-gradient); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;">
        <span style="font-size: 2.5rem;">🐾</span>
    </div>
    <h1 style="font-size: 1.5rem; margin-bottom: 8px;">Welcome Back!</h1>
    <p style="color: var(--gray-500);">Login to manage your bookings</p>
</div>

<form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
    </div>
    
    <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="Enter password" required>
    </div>
    
    <button type="submit" class="btn btn-primary">
        <span>Login</span>
        <span>→</span>
    </button>
</form>

<div style="text-align: center; margin: 20px 0; color: var(--gray-400);">
    <span>or</span>
</div>

<!-- Google Login (Placeholder) -->
<button class="btn btn-secondary" onclick="alert('Google login coming soon!')" style="margin-bottom: 15px;">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    <span>Continue with Google</span>
</button>

<div style="text-align: center; margin-top: 30px;">
    <p style="color: var(--gray-500);">
        Don't have an account? 
        <a href="{{ url_for('register') }}" style="color: var(--primary-purple); font-weight: 600;">Register</a>
    </p>
</div>

<div style="text-align: center; margin-top: 20px;">
    <a href="{{ url_for('home') }}" style="color: var(--gray-400); font-size: 0.875rem;">← Back to Home</a>
</div>
{% endblock %}
