<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petgully Spotless</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="kiosk-container">
        <!-- Header -->
        <header class="header">
            <div class="machine-id">{{ machine_id }}</div>
            <div class="status-indicator" id="statusIndicator">
                <span class="status-dot online"></span>
                <span>Ready</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Left Side - Image -->
            <div class="welcome-image">
                <img src="{{ url_for('static', filename='images/welcome.png') }}" alt="Welcome to Petgully" id="welcomeImage">
            </div>

            <!-- Right Side - Input Section -->
            <div class="input-section">
                <!-- Logo -->
                <div class="logo-container">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Petgully Logo" class="logo">
                </div>

                <!-- Title -->
                <h1 class="title">Petgully Spotless</h1>
                <p class="subtitle">Automated Pet Grooming System</p>

                <!-- Instructions -->
                <div class="instructions">
                    <div class="instruction-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="7" y1="7" x2="7" y2="7"></line>
                            <line x1="17" y1="7" x2="17" y2="7"></line>
                            <line x1="7" y1="17" x2="7" y2="17"></line>
                            <line x1="17" y1="17" x2="17" y2="17"></line>
                            <line x1="12" y1="12" x2="12" y2="12"></line>
                        </svg>
                    </div>
                    <p class="instruction-text">Please scan your QR code to begin</p>
                    <p class="instruction-subtext">Hold the QR code in front of the scanner</p>
                </div>

                <!-- Input Field -->
                <div class="input-container">
                    <input 
                        type="password" 
                        id="qrInput" 
                        class="qr-input" 
                        placeholder="Scan QR Code here..."
                        autofocus
                        autocomplete="off"
                    >
                    <button id="startButton" class="start-button" disabled>
                        <span>START SESSION</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                    </button>
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="error-message hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="15" y1="9" x2="9" y2="15"></line>
                        <line x1="9" y1="9" x2="15" y2="15"></line>
                    </svg>
                    <span id="errorText">Error message here</span>
                </div>

                <!-- Quick Access (Admin) -->
                <div class="quick-access" id="quickAccess">
                    <p class="quick-title">Quick Access:</p>
                    <div class="quick-buttons">
                        <button class="quick-btn" data-type="small">Small Bath</button>
                        <button class="quick-btn" data-type="large">Large Bath</button>
                        <button class="quick-btn" data-type="custdiy">DIY</button>
                        <button class="quick-btn" data-type="quicktest">Test</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Petgully - We Care</p>
            <p class="footer-time" id="currentTime"></p>
        </footer>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-content">
            <div class="loader"></div>
            <p>Starting Session...</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
